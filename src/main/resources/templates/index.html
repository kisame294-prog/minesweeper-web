<!DOCTYPE html>
<html  lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マインスイーパー（Board準拠版）</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<h2 class="title">MINESWEEPER</h2>

<div class="result-overlay game-over" th:if="${gameOver}">
    <div class="result-panel">
        <h1>GAME OVER</h1>
        <p>MISSION FAILED</p>
        <form th:action="@{/reset}" method="post">
            <button class="reset-btn">
                RETRY
            </button>
        </form>
    </div>
</div>


<div class="result-overlay clear" th:if="${isClear}">
    <div class="result-panel">
        <h1>CLEAR</h1>
        <p>MISSION COMPLETE</p>
        <form th:action="@{/reset}" method="post">
            <button class="reset-btn">
                NEXT GAME
            </button>
        </form>
    </div>
</div>

<div class="toolbar">
<!-- リセット -->
    <form id="resetForm" th:action="@{/reset}" method="post">
        <button type="submit" class="reset-btn">
            RESET
        </button>
    </form>
</div>

<div class="board-frame">

    <table class="board">
        <tr th:each="row, yStat : ${board.visibleBoard}">
            <td th:each="cell, xStat : ${row}">

                <!-- 未開 -->
                <form th:if="${cell == '□'}"
                      th:action="@{/open}"
                      method="post">

                    <input type="hidden" name="y" th:value="${yStat.index}">
                    <input type="hidden" name="x" th:value="${xStat.index}">

                    <button class="cell closed"></button>

                </form>

                <!-- フラグ -->
                <form th:if="${cell == 'F'}"
                      th:action="@{/flag}"
                      method="post">

                    <input type="hidden" name="y" th:value="${yStat.index}">
                    <input type="hidden" name="x" th:value="${xStat.index}">

                    <button class="cell flag">🚩</button>

                </form>

                <!-- 開いたマス -->
                <div th:if="${cell != '□' && cell != 'F'}"
                     class="cell opened"
                     th:classappend="${cell == '*'} ? ' mine' : ''">

                    <span th:text="${cell == '0' ? '' : cell}"></span>

                </div>

            </td>
        </tr>
    </table>

</div>

<script src="/js/app.js"></script>

</body>
</html>
