<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マインスイーパー（Board準拠版）</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

<h2 class="title">MINESWEEPER</h2>

<!-- ゲームオーバー -->
<div class="result-overlay game-over"
     th:if="${gameOver}">
    <div class="result-panel">
        <h1>GAME OVER</h1>
        <p>MISSION FAILED</p>
        <form th:action="@{/reset}" method="post">
            <button class="reset-btn">
                RETRY
            </button>
        </form>
        <form th:action="@{/select}" method="post">
            <button class="reset-btn" type="submit">
                SELECT DIFFICULTY
            </button>
        </form>
    </div>
</div>

<!-- ゲームクリア -->
<div class="result-overlay clear"
     th:if="${isClear}">
    <div class="result-panel">
        <h1>CLEAR</h1>
        <p>MISSION COMPLETE</p>
        <p class="clear-time">
           TIME:
            <span th:text="${formattedElapsedTime}">
                000
            </span>
        </p>
        <form th:action="@{/reset}" method="post">
            <button class="reset-btn">
                NEXT GAME
            </button>
        </form>
        <form th:action="@{/select}" method="post">
            <button class="reset-btn" type="submit">
                SELECT DIFFICULTY
            </button>
        </form>
    </div>
</div>

<!-- タイマー -->
<div class="timer">
    TIME :
    <span id="timer"
          th:data-time="${elapsedTime}"
          th:text="${formattedElapsedTime}"
          th:data-running="${timerRunning}">
        000
    </span>
</div>

<div class="toolbar">
<!-- リセット -->
    <form id="resetForm" th:action="@{/reset}" method="post">
        <button type="submit" class="reset-btn">
            RESET
        </button>
    </form>
</div>

<div class="board-frame">

    <table class="board">
        <tr th:each="row, yStat : ${board.visibleBoard}">
            <td th:each="cell, xStat : ${row}">

                <!-- 閉じている -->
                <form th:if="${board.isClosed(yStat.index, xStat.index)}"
                      th:action="@{/open}"
                      method="post">

                    <input type="hidden" name="y" th:value="${yStat.index}">
                    <input type="hidden" name="x" th:value="${xStat.index}">

                    <button type="submit" class="cell closed"></button>

                </form>
                <!-- フラグ（隠してる） -->
                <form th:action="@{/flag}"
                      method="post"
                      class="hidden-flag-form">

                    <input type="hidden" name="y" th:value="${yStat.index}">
                    <input type="hidden" name="x" th:value="${xStat.index}">

                </form>

                <!-- フラグ -->
                <form th:if="${board.isFlag(yStat.index, xStat.index)}"
                      th:action="@{/flag}"
                      method="post">

                    <input type="hidden" name="y" th:value="${yStat.index}">
                    <input type="hidden" name="x" th:value="${xStat.index}">

                    <button type="submit" class="cell flag">
                        <img th:src="@{/images/flag.png}"
                             alt="Flag"
                             class="cell-icon">
                    </button>

                </form>

                <!-- 開いたマス -->
                <div th:if="${!board.isClosed(yStat.index, xStat.index)
                           && !board.isFlag(yStat.index, xStat.index)}"
                     class="cell opened"
                     th:classappend="${board.getCellClass(yStat.index, xStat.index)}">

                    <!-- 爆弾 -->
                    <img th:if="${board.isMineVisible(yStat.index, xStat.index)}"
                         th:src="@{/images/mine.png}"
                         alt="Bomb"
                         class="cell-icon">

                    <!-- 数字 -->
                    <span th:unless="${board.isMineVisible(yStat.index, xStat.index)}"
                          th:text="${board.getDisplayValue(yStat.index, xStat.index)}">

                    </span>
                </div>
            </td>
        </tr>
    </table>
</div>

<script th:src="@{/js/app.js}"></script>

</body>
</html>
