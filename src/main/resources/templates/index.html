<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マインスイーパー（Board準拠版）</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<h2 class="title">MINESWEEPER</h2>

<div class="board-frame">

    <table class="board">
        <tr th:each="row, yStat : ${board.visibleBoard}">
            <td th:each="cell, xStat : ${row}">

                <!-- 閉じている -->
                <form th:if="${board.isClosed(yStat.index, xStat.index)}"
                      th:action="@{/open}"
                      method="post">

                    <input type="hidden" name="y" th:value="${yStat.index}">
                    <input type="hidden" name="x" th:value="${xStat.index}">

                    <button type="submit" class="cell closed"></button>

                </form>

                <!-- フラグ -->
                <form th:if="${board.isFlag(yStat.index, xStat.index)}"
                      th:action="@{/flag}"
                      method="post">

                    <input type="hidden" name="y" th:value="${yStat.index}">
                    <input type="hidden" name="x" th:value="${xStat.index}">

                    <button type="submit" class="cell flag">🚩</button>

                </form>

                <!-- 開いたマス -->
                <div th:if="${!board.isClosed(yStat.index, xStat.index) && !board.isFlag(yStat.index, xStat.index)}"
                     class="cell opened"
                     th:classappend="${board.isMineVisible(yStat.index, xStat.index)} ? ' mine' : ''">

                    <span th:text="${board.getDisplayValue(yStat.index, xStat.index)}"></span>

                </div>

            </td>
        </tr>
    </table>

</div>

<script src="/js/app.js"></script>

</body>
</html>
